# Pytest configuration for DeFiPy.
#
# Markers are registered here so `pytest --strict-markers` (and the
# default warning behavior) doesn't flag custom markers as unknown.

[pytest]
markers =
    live_rpc: tests that hit a real Ethereum RPC. Skipped by default.
        Run with `DEFIPY_LIVE_RPC=https://... pytest -m live_rpc`.
